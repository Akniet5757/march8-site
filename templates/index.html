<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>8 наурыз мерекелеріңмен! 🌸</title>

<!-- ШРИФТЫ -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --pink:#F6C1CC;
    --dark-pink:#E91E63;
    --text:#4A2E35;
    --soft:#FFF5F7;
}

body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#FFEFF4,#FADADD);
    color:var(--text);
    overflow-x:hidden;
    transition:.5s;
}

/* DARK MODE */
body.dark{
    background:#1f1f1f;
    color:#f5f5f5;
}
body.dark .card{background:#2f2f2f}
body.dark h1, body.dark h3{color:#FFD1DC}

/* ЛЕПЕСТКИ */
.petal{
    position:fixed;
    top:-50px;
    font-size:22px;
    animation:fall linear infinite;
    z-index:5;
    opacity:.8
}
@keyframes fall{
    0%{transform:translateY(-50px)}
    100%{transform:translateY(110vh)}
}

/* ШИРМА */
#curtain-container{
    position:fixed;
    inset:0;
    z-index:10000
}
.curtain{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    background:linear-gradient(135deg,#FFB6C1,#FFC0CB);
    transition:2.5s cubic-bezier(.77,0,.18,1)
}
.curtain-left{left:0}
.curtain-right{right:0}
.open-left{transform:translateX(-100%)}
.open-right{transform:translateX(100%)}

#curtain-handle{
    position:absolute;
    top:50%;
    right:5%;
    transform:translateY(-50%);
    z-index:10001;
    background:var(--dark-pink);
    color:#fff;
    padding:18px 30px;
    border-radius:40px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.25)
}

/* КОНТЕНТ */
#mainContent{
    display:none;
    opacity:0;
    padding:60px 40px;
    max-width:1200px;
    margin:auto;
    text-align:center
}

h1{
    font-family:'Playfair Display',serif;
    font-size:48px;
    margin-bottom:15px;
    color:#7A2E3A;
}
body.dark h1{color:#FFD1DC}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:35px;
    margin-top:50px
}

.card{
    background:#fff;
    padding:30px 20px;
    border-radius:30px;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 15px 40px rgba(0,0,0,.12)
}
.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #F8BBD0;
    margin-bottom:15px
}

.card h3{
    font-size:20px;
    font-weight:600;
    margin:0;
    color:#6B2C3E
}

/* ПОДАРОК */
.gift-btn{
    padding:18px 45px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#FFD700,#FFB300);
    color:#fff;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:60px;
    box-shadow:0 15px 30px rgba(0,0,0,.2)
}

.gift{
    display:none;
    margin-top:35px
}
.gift img{
    width:320px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.25)
}
.gift p{
    font-size:20px;
    margin-top:20px;
    font-weight:500
}

/* МОДАЛКА */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:20000
}
.modal-content{
    max-width:80%;
    max-height:80%;
    margin:auto;
    display:block;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.4)
}
#modalCaption{
    color:#FFD1DC;
    font-size:24px;
    font-family:'Playfair Display',serif;
    margin-top:25px;
    text-align:center
}
.close{
    position:absolute;
    top:20px;
    right:30px;
    color:#fff;
    font-size:42px;
    cursor:pointer
}
</style>
</head>

<body>

<!-- 🎵 МУЗЫКА -->
<audio id="bgMusic" loop>
    <source src="{{ url_for('static', filename='music/background.mp3.mp3') }}" type="audio/mpeg">
</audio>

<!-- КНОПКИ -->
<button onclick="toggleMusic()" style="position:fixed;top:15px;right:15px;z-index:30000">🎵</button>
<button onclick="document.body.classList.toggle('dark')" style="position:fixed;top:15px;left:15px;z-index:30000">🌙</button>

<script>
for(let i=0;i<35;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=6+Math.random()*6+"s";
    document.body.appendChild(p);
}
</script>

<!-- ШИРМА -->
<div id="curtain-container">
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>
    <div id="curtain-handle" onclick="openCurtain()">Өзіңе тарт 💖</div>
</div>

<!-- КОНТЕНТ -->
<div id="mainContent">
<h1>🌷 8 наурыз мерекесі құтты болсын, менің сүйкімді оқушыларым! 🌷</h1>

<div class="cards">
{% for student in students %}
<div class="card" onclick="openStudentModal('{{ student.name }}','{{ url_for('static', filename=student.photo) }}')">
    <img src="{{ url_for('static', filename=student.photo) }}">
    <h3>{{ student.name }}</h3>
</div>
{% endfor %}
</div>

<button class="gift-btn" onclick="openGift()">🎁 Сыйлықты ашу </button>
<div class="gift" id="gift">
    <img src="{{ url_for('static', filename='students/kurator.jpg.jpeg') }}">
    <p>💐 Керемет кураторларыңнан әдемі гүл шоғы 💐</p>
</div>
</div>

<!-- МОДАЛКА -->
<div class="modal" id="studentModal">
<span class="close" onclick="closeModal()">&times;</span>
<img class="modal-content" id="modalImg">
<div id="modalCaption"></div>
</div>

<script>
const bgMusic=document.getElementById("bgMusic");

function toggleMusic(){
    bgMusic.paused ? bgMusic.play() : bgMusic.pause();
}

function openCurtain(){
    document.querySelector('.curtain-left').classList.add('open-left');
    document.querySelector('.curtain-right').classList.add('open-right');
    document.getElementById('curtain-handle').style.display='none';

    setTimeout(()=>{
        document.getElementById('curtain-container').style.display='none';
        const c=document.getElementById('mainContent');
        c.style.display='block';
        let o=0;
        let f=setInterval(()=>{
            c.style.opacity=o;
            o+=0.05;
            if(o>=1)clearInterval(f);
        },30);
        bgMusic.play().catch(()=>{});
    },2500);
}

function openStudentModal(name,photo){
    document.getElementById('studentModal').style.display='block';
    document.getElementById('modalImg').src=photo;
    document.getElementById('modalCaption').innerHTML=`💖 ${name}, ты невероятная! 💖`;
}
function closeModal(){
    document.getElementById('studentModal').style.display='none';
}
function openGift(){
    document.getElementById('gift').style.display='block';
}
</script>

</body>
</html>
